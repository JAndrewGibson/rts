services:
  - type: web
    name: doodle-rts
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gevent -w 1 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: doodle-rts-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: doodle-rts-db
          property: connectionString

  - type: keyvalue
    name: doodle-rts-redis
    ipAllowList: [] # Only allow internal connections

databases:
  - name: doodle-rts-db
    databaseName: rts_marketplace
    user: rts_admin
    plan: free # Change if needed
